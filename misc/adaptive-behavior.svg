<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 730" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="960" height="730" fill="#ffffff"/>

  <!-- Participant turn -->
  <rect x="330" y="24" width="300" height="48" rx="9" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="480" y="44" text-anchor="middle" font-size="13" font-weight="600" fill="#0F172A">Participant finishes a turn</text>
  <text x="480" y="62" text-anchor="middle" font-size="10.5" fill="#475569">voice or text</text>
  <line x1="480" y1="72" x2="480" y2="100" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Engagement processor -->
  <rect x="250" y="102" width="460" height="104" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="480" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A">Engagement processor</text>
  <text x="480" y="148" text-anchor="middle" font-size="11" fill="#475569">features: word count &#183; fillers / hedges &#183; response latency &#183; voiced energy</text>
  <text x="480" y="166" text-anchor="middle" font-size="11" fill="#475569">rule-based score 0&#8211;1 &#8594; low / medium / high</text>
  <text x="480" y="184" text-anchor="middle" font-size="11" fill="#475569">events &amp; flags: sustained_disengagement &#183; very_short_answer &#183; high_filler &#183; &#8230;</text>
  <line x1="480" y1="206" x2="480" y2="234" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Policy engine -->
  <rect x="250" y="236" width="460" height="84" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="480" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A">Adaptive policy engine (per agent)</text>
  <text x="480" y="282" text-anchor="middle" font-size="11" fill="#475569">rules: WHEN &#60;trigger&#62; DO &#60;action&#62; &#183; per-rule cooldown</text>
  <text x="480" y="300" text-anchor="middle" font-size="11" fill="#475569">at most one prompt action + one pace action per turn</text>

  <!-- Branches -->
  <path d="M480,320 L480,340 L240,340 L240,364" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="246" y="356" font-size="10.5" font-weight="600" fill="#64748B">mode: shadow (default)</text>
  <path d="M480,320 L480,340 L680,340 L680,364" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="688" y="356" font-size="10.5" font-weight="600" fill="#047857">mode: live</text>

  <!-- Shadow -->
  <rect x="90" y="366" width="300" height="88" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="240" y="392" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0F172A">Shadow mode &#8212; log only</text>
  <text x="240" y="414" text-anchor="middle" font-size="11" fill="#475569">the intended action is recorded;</text>
  <text x="240" y="432" text-anchor="middle" font-size="11" fill="#475569">the conversation is completely unchanged</text>
  <line x1="240" y1="454" x2="240" y2="492" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Audit -->
  <rect x="90" y="494" width="300" height="118" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="240" y="518" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0F172A">Audit trail &#8212; adaptive_actions</text>
  <text x="240" y="540" text-anchor="middle" font-size="11" fill="#475569">one row per action, applied or not:</text>
  <text x="240" y="558" text-anchor="middle" font-size="11" fill="#475569">turn &#183; trigger &#183; action &#183; mode &#183; detail</text>
  <text x="240" y="576" text-anchor="middle" font-size="11" fill="#475569">(instruction text or pace mechanism)</text>
  <text x="240" y="598" text-anchor="middle" font-size="10" font-style="italic" fill="#1E40AF">live sessions are flagged adaptive_active</text>

  <!-- Live -->
  <rect x="470" y="366" width="420" height="246" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="680" y="390" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0F172A">Live mode &#8212; action applied</text>

  <rect x="490" y="404" width="380" height="96" rx="8" fill="#FFFFFF" stroke="#10B981"/>
  <text x="680" y="426" text-anchor="middle" font-size="12" font-weight="600" fill="#0F172A">Prompt action</text>
  <text x="680" y="446" text-anchor="middle" font-size="10" font-style="italic" fill="#475569">&#8220;[Interviewer guidance &#8212; &#8230; follow it silently;</text>
  <text x="680" y="461" text-anchor="middle" font-size="10" font-style="italic" fill="#475569">never read it aloud &#8230;]&#8221; + the rule&#8217;s instruction text</text>
  <text x="680" y="484" text-anchor="middle" font-size="10.5" fill="#475569">added to the model context before its next reply</text>

  <rect x="490" y="512" width="380" height="84" rx="8" fill="#FFFFFF" stroke="#10B981"/>
  <text x="680" y="534" text-anchor="middle" font-size="12" font-weight="600" fill="#0F172A">Pace action (voice only)</text>
  <text x="680" y="556" text-anchor="middle" font-size="10.5" fill="#475569">OpenAI gpt-4o TTS &#8594; voice instructions (natural, no distortion)</text>
  <text x="680" y="574" text-anchor="middle" font-size="10.5" fill="#475569">ElevenLabs / Cartesia &#8594; native speed parameter (0.7&#8211;1.2)</text>

  <line x1="470" y1="553" x2="392" y2="553" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="431" y="544" text-anchor="middle" font-size="9.5" fill="#64748B">recorded too</text>

  <line x1="680" y1="612" x2="680" y2="640" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Next turn -->
  <rect x="530" y="642" width="300" height="48" rx="9" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="680" y="662" text-anchor="middle" font-size="13" font-weight="600" fill="#0F172A">Agent&#8217;s next turn adapts</text>
  <text x="680" y="680" text-anchor="middle" font-size="10.5" fill="#475569">participant never sees the instruction</text>

  <!-- Loop back -->
  <path d="M830,666 L920,666 L920,48 L634,48" fill="none" stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arr2)"/>
  <text x="912" y="360" text-anchor="end" font-size="10" font-style="italic" fill="#94A3B8">conversation continues</text>
</svg>
