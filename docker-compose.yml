# ============================================================
# Docker Compose — Elestio Deployment Branch
# ============================================================
# This file lives on the `elestio-deployment` branch only.
# It replaces the standard docker-compose.yml from `main` because
# Elestio's host-level nginx (with auto-SSL) already binds 80/443
# and cannot be disabled — so we drop the in-stack Caddy proxy.
#
# The frontend's nginx (see frontend/nginx.conf on this branch)
# proxies /api/ and /ws/ to the backend container, so Elestio's
# reverse proxy only needs ONE rule:
#
#   HTTPS 443 → HTTP 3000 on path /   (target IP 172.17.0.1)
#
# Do NOT merge this branch into main. Pull updates from main into
# this branch when the application code changes:
#   git checkout elestio-deployment
#   git merge main          # resolve conflicts in favor of this branch
# ============================================================

services:
  # ── Frontend (also reverse-proxies /api/ and /ws/ to backend) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "172.17.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - oasis_net

  # ── Backend API (internal only — reached via frontend nginx) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oasis_net

  # ── PostgreSQL (with pgvector for RAG embeddings) ─────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-surveyor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-surveyor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-surveyor}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - oasis_net

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - oasis_net

volumes:
  pgdata:
  redisdata:

networks:
  oasis_net:
    driver: bridge
