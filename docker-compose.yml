# ============================================================
# Docker Compose — Elestio Deployment Branch
# ============================================================
# This file lives on the `elestio-deployment` branch only.
# It replaces the standard docker-compose.yml from `main` because
# Elestio's host-level nginx (with auto-SSL) already binds 80/443
# and cannot be disabled — so we drop the in-stack Caddy proxy.
#
# Frontend and backend are bound to the Docker bridge IP
# (172.17.0.1) so Elestio's nginx can reverse-proxy to them.
#
# In the Elestio dashboard → "Reverse proxy configuration":
#   1. HTTPS 443 → HTTP 8000  on path /api/   (backend)
#   2. HTTPS 443 → HTTP 8000  on path /ws/    (backend)
#   3. HTTPS 443 → HTTP 3000  on path /       (frontend)
#
# Do NOT merge this branch into main. Pull updates from main into
# this branch when the application code changes:
#   git checkout elestio-deployment
#   git merge main          # then resolve docker-compose.yml in favor of this file
# ============================================================

services:
  # ── Frontend (served by Elestio nginx on /) ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "172.17.0.1:3000:80"
    networks:
      - oasis_net

  # ── Backend API (served by Elestio nginx on /api, /ws) ────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "172.17.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oasis_net

  # ── PostgreSQL (with pgvector for RAG embeddings) ─────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-surveyor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-surveyor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-surveyor}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - oasis_net

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - oasis_net

volumes:
  pgdata:
  redisdata:

networks:
  oasis_net:
    driver: bridge
