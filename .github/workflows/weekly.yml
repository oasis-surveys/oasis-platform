# ─────────────────────────────────────────────────────────────────
# OASIS — Scheduled Test Suite (every 3 weeks)
#
# Comprehensive test run including:
# - All unit/integration tests
# - Dependency audit
# - Docker compose validation
#
# Cron fires every Monday at 06:00 UTC. A guard job skips the
# run unless the ISO week number is divisible by 3, giving us an
# effective cadence of once every three weeks.
# Can also be triggered manually at any time.
# No paid API keys required. All external calls are mocked.
# ─────────────────────────────────────────────────────────────────

name: Scheduled Tests

on:
  schedule:
    # Every Monday at 06:00 UTC (guard job filters to every 3 weeks)
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual triggering (always runs)

env:
  POSTGRES_HOST: localhost
  POSTGRES_USER: test
  POSTGRES_PASSWORD: test
  POSTGRES_DB: test
  REDIS_URL: redis://localhost:6379/15
  SECRET_KEY: weekly-test-secret-key
  AUTH_ENABLED: "false"
  OPENAI_API_KEY: sk-test-fake-weekly-key
  DEEPGRAM_API_KEY: dg-test-fake-weekly-key
  ELEVENLABS_API_KEY: el-test-fake-weekly-key
  GOOGLE_API_KEY: goog-test-fake-weekly-key

jobs:
  # ── Schedule Gate (skip unless week % 3 == 0 or manual) ─────────
  schedule-gate:
    name: Schedule Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if this week should run
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger, running."
          else
            WEEK=$(date +%V)
            if [ $(( WEEK % 3 )) -eq 0 ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "Week $WEEK is divisible by 3, running."
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "Week $WEEK is not divisible by 3, skipping."
            fi
          fi

  # ── Full Backend Test Suite ───────────────────────────────────
  backend-full:
    name: Backend Full Test Suite
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full test suite with verbose output
        run: |
          cd backend
          python -m pytest tests/ \
            -v \
            --tb=long \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-fail-under=40

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          retention-days: 30

  # ── Full Frontend Test Suite ──────────────────────────────────
  frontend-full:
    name: Frontend Full Test Suite
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Run tests with verbose output
        run: |
          cd frontend
          npx vitest run --reporter=verbose

      - name: Build check
        run: |
          cd frontend
          npm run build

  # ── Dependency Audit ──────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Python dependency check
        run: |
          cd backend
          pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit --strict 2>&1 || echo "Python dependency vulnerabilities found"
        continue-on-error: true

      - name: Node dependency check
        run: |
          cd frontend
          npm ci || npm install
          npm audit --production 2>&1 || echo "Node dependency vulnerabilities found"
        continue-on-error: true

  # ── Docker Compose Validation ─────────────────────────────────
  docker-validation:
    name: Docker Compose Validation
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env for validation
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=sk-test
          DEEPGRAM_API_KEY=dg-test
          ELEVENLABS_API_KEY=el-test
          SECRET_KEY=test-secret
          EOF

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Build all images
        run: docker compose build --no-cache

      - name: Check container startup (dry run)
        run: |
          docker compose up -d --no-start
          docker compose down
