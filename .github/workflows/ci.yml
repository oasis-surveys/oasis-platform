# ─────────────────────────────────────────────────────────────────
# SURVEYOR — CI Pipeline
#
# Runs on every push and pull request.
# No paid API keys required — all external calls are mocked.
# ─────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── Test environment (no real keys needed) ──
  POSTGRES_HOST: localhost
  POSTGRES_USER: test
  POSTGRES_PASSWORD: test
  POSTGRES_DB: test
  REDIS_URL: redis://localhost:6379/15
  SECRET_KEY: ci-test-secret-key
  AUTH_ENABLED: "false"
  OPENAI_API_KEY: sk-test-fake-ci-key
  DEEPGRAM_API_KEY: dg-test-fake-ci-key
  ELEVENLABS_API_KEY: el-test-fake-ci-key
  GOOGLE_API_KEY: goog-test-fake-ci-key

jobs:
  # ── Backend Tests ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd backend
          python -m pytest tests/ \
            --tb=short \
            --no-header \
            -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── Frontend Tests ────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Run tests
        run: |
          cd frontend
          npx vitest run --reporter=verbose

  # ── Frontend Build Check ──────────────────────────────────────
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: TypeScript type check
        run: |
          cd frontend
          npx tsc -b --noEmit 2>&1 || true

      - name: Build
        run: |
          cd frontend
          npm run build

  # ── Docker Build Check ────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t surveyor-backend:test ./backend

      - name: Build frontend Docker image
        run: docker build -t surveyor-frontend:test ./frontend
